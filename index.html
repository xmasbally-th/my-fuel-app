<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Receipt & Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbw01CKa9GeKzyyEhszlqXqWo7C9_d_NviMsE0dG447b8MEx8n7o0JXUTttTmrhystkS/exec";
        
        const safeParseNum = (val) => parseFloat(String(val || '0').replace(/,/g, '')) || 0;

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 5000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';

            return (
                <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-[95%] max-w-sm">
                    <div className={`${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3`}>
                        <i className={`fas ${icon} text-xl flex-shrink-0`}></i>
                        <span className="font-medium text-xs leading-tight break-words">{message}</span>
                    </div>
                </div>
            );
        };

        const LoadingOverlay = ({ text }) => (
            <div className="fixed inset-0 bg-black/50 z-40 flex flex-col items-center justify-center backdrop-blur-sm">
                <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-4 text-center max-w-xs">
                    <div className="spinner w-10 h-10 border-4 border-t-emerald-500"></div>
                    <p className="text-gray-700 font-medium text-sm">{text}</p>
                </div>
            </div>
        );

        const BarChart = ({ data }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!data || data.length === 0) return;
                const monthlySpend = {};
                data.forEach(item => {
                    const dateStr = item['วันที่ (Date)'];
                    if (!dateStr) return;
                    const month = dateStr.substring(0, 7);
                    monthlySpend[month] = (monthlySpend[month] || 0) + safeParseNum(item['ราคาหลังลด (Total Paid)']);
                });
                const labels = Object.keys(monthlySpend).sort();
                const values = labels.map(l => monthlySpend[l]);
                const ctx = canvasRef.current.getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(l => {
                            const [y, m] = l.split('-');
                            const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
                            return `${months[parseInt(m)-1]} ${y.substring(2)}`;
                        }),
                        datasets: [{ label: 'ยอดจ่ายจริง (บาท)', data: values, backgroundColor: 'rgba(16, 185, 129, 0.8)', borderRadius: 6 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
                return () => chart.destroy();
            }, [data]);
            return <div className="h-48 w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const LineChart = ({ data }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!data || data.length === 0) return;
                const recentData = [...data].sort((a, b) => new Date(a['วันที่ (Date)']) - new Date(b['วันที่ (Date)'])).slice(-10);
                const labels = recentData.map(item => {
                    if(!item['วันที่ (Date)']) return '';
                    const d = item['วันที่ (Date)'].split('-');
                    return `${d[2]}/${d[1]}`;
                });
                const values = recentData.map(item => safeParseNum(item['ราคา/ลิตร (Price/L)']));
                const ctx = canvasRef.current.getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{ label: 'ราคาต่อลิตร (บาท)', data: values, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
                return () => chart.destroy();
            }, [data]);
            return <div className="h-48 w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('record');
            const [toast, setToast] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");
            
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');

            const [imageBase64, setImageBase64] = useState(null);
            const [formData, setFormData] = useState({
                date: '', fuelType: '', pricePerLiter: '', volume: '', 
                totalBeforeDiscount: '', discount: '0', totalAfterDiscount: ''
            });
            const fileInputRef = useRef(null);
            
            const [sheetData, setSheetData] = useState([]);
            
            // State สำหรับตัวกรอง Dashboard
            const [selectedFuel, setSelectedFuel] = useState('All');
            const [selectedYear, setSelectedYear] = useState('All');
            const [dashMetrics, setDashMetrics] = useState({ totalSpend: 0, totalVolume: 0, totalDiscount: 0, avgPrice: 0 });

            // ดึงรายชื่อน้ำมันและปีที่ไม่ซ้ำกัน (สำหรับ Dropdown)
            const uniqueFuels = ['All', ...new Set(sheetData.map(item => item['ชนิดน้ำมัน (Fuel Type)']).filter(Boolean))];
            const uniqueYears = ['All', ...new Set(sheetData.map(item => String(item['วันที่ (Date)'] || '').substring(0, 4)).filter(y => y.length === 4))].sort().reverse();

            const showToast = (message, type = 'success') => setToast({ message, type });

            // อัปเดตตัวเลขเมื่อกรองข้อมูล (รถ + ปี)
            useEffect(() => {
                const filteredData = sheetData.filter(item => {
                    const matchFuel = selectedFuel === 'All' || item['ชนิดน้ำมัน (Fuel Type)'] === selectedFuel;
                    const itemYear = String(item['วันที่ (Date)'] || '').substring(0, 4);
                    const matchYear = selectedYear === 'All' || itemYear === selectedYear;
                    return matchFuel && matchYear;
                });
                
                let tSpend = 0, tVol = 0, tDisc = 0;
                filteredData.forEach(item => {
                    tSpend += safeParseNum(item['ราคาหลังลด (Total Paid)']);
                    tVol += safeParseNum(item['จำนวนลิตร (Volume)']);
                    tDisc += safeParseNum(item['ส่วนลด (Discount)']);
                });
                
                setDashMetrics({ 
                    totalSpend: tSpend, 
                    totalVolume: tVol, 
                    totalDiscount: tDisc, 
                    avgPrice: tVol > 0 ? (tSpend / tVol) : 0 
                });
            }, [sheetData, selectedFuel, selectedYear]);

            // ===== 🛠️ ฟังก์ชันคำนวณอัตโนมัติ (Auto-Calc) =====
            const handleFormChange = (field, value) => {
                let newForm = { ...formData, [field]: value };
                
                // 1. ถ้ายูสเซอร์กรอก ลิตร หรือ ราคา/ลิตร -> คำนวณราคาก่อนลดให้
                if (field === 'volume' || field === 'pricePerLiter') {
                    const v = parseFloat(newForm.volume);
                    const p = parseFloat(newForm.pricePerLiter);
                    if (!isNaN(v) && !isNaN(p)) {
                        newForm.totalBeforeDiscount = (v * p).toFixed(2);
                    }
                }
                
                // 2. ถ้ามีการแก้ไขตัวเลขใดๆ ที่เกี่ยวกับเงิน -> คำนวณราคาจ่ายจริงให้ (ก่อนลด - ส่วนลด)
                if (field === 'volume' || field === 'pricePerLiter' || field === 'totalBeforeDiscount' || field === 'discount') {
                    const tb = parseFloat(newForm.totalBeforeDiscount);
                    const d = parseFloat(newForm.discount) || 0;
                    if (!isNaN(tb)) {
                        newForm.totalAfterDiscount = (tb - d).toFixed(2);
                    }
                }
                
                setFormData(newForm);
            };

            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    setIsLoading(true);
                    setLoadingText("กำลังประมวลผลรูปภาพ...");
                    const resizedBase64 = await resizeImage(file);
                    setImageBase64(resizedBase64);
                    await extractDataWithAI(resizedBase64);
                } catch (err) {
                    showToast("เกิดข้อผิดพลาดในการโหลดรูป", "error");
                    setIsLoading(false);
                }
            };

            const extractDataWithAI = async (base64Str) => {
                let currentKey = apiKey;
                
                if (!currentKey) {
                    setIsLoading(false);
                    const userInput = window.prompt("⚠️ กรุณาใส่ Gemini API Key ของคุณ (ระบบจะจำไว้ในเครื่อง):");
                    
                    if (!userInput || userInput.trim() === "") {
                        showToast("คุณไม่ได้ใส่ API Key", "error");
                        return;
                    }
                    currentKey = userInput.trim();
                    setApiKey(currentKey);
                    localStorage.setItem('gemini_api_key', currentKey);
                    setIsLoading(true);
                }

                setLoadingText("AI กำลังอ่านใบเสร็จ... (อาจใช้เวลาสักครู่)");
                
                const prompt = `ดึงข้อมูลจากใบเสร็จค่าน้ำมันภาษาไทยนี้ ตอบกลับเป็นรูปแบบ JSON เท่านั้น ห้ามมีข้อความอื่นเจือปน
{
  "date": "YYYY-MM-DD", 
  "fuelType": "ชนิดน้ำมัน เช่น แก๊สโซฮอล์ 95",
  "pricePerLiter": 31.65,
  "volume": 33.17,
  "totalBeforeDiscount": 1050.00,
  "discount": 17.00,
  "totalAfterDiscount": 1033.00
}`;

                const payload = {
                    contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Str.split(',')[1] } }] }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentKey}`;
                const delays = [1000, 2000, 3000];
                let lastErrorMsg = "";

                for (let i = 0; i < 3; i++) {
                    try {
                        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        
                        if (!response.ok) {
                            const errData = await response.json();
                            const errMsg = (errData && errData.error && errData.error.message) ? errData.error.message : "ไม่ทราบสาเหตุ";
                            throw new Error("API Error: " + errMsg);
                        }
                        
                        const result = await response.json();
                        let text = '';
                        if (result.candidates && result.candidates.length > 0 && result.candidates[0].content && result.candidates[0].content.parts && result.candidates[0].content.parts.length > 0) {
                            text = result.candidates[0].content.parts[0].text;
                        }
                        
                        const jsonMatch = text.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            text = jsonMatch[0];
                        } else {
                            throw new Error("AI ส่งข้อมูลมาผิดรูปแบบ (ไม่ใช่ JSON): " + text.substring(0, 30));
                        }
                        
                        const extractedData = JSON.parse(text);
                        
                        setFormData({
                            date: extractedData.date || '',
                            fuelType: extractedData.fuelType || '',
                            pricePerLiter: extractedData.pricePerLiter || '',
                            volume: extractedData.volume || '',
                            totalBeforeDiscount: extractedData.totalBeforeDiscount || '',
                            discount: extractedData.discount || '0',
                            totalAfterDiscount: extractedData.totalAfterDiscount || ''
                        });
                        
                        showToast("ดึงข้อมูลสำเร็จ! กรุณาตรวจสอบความถูกต้อง");
                        setIsLoading(false);
                        return;
                    } catch (error) {
                        lastErrorMsg = error.message;
                        console.error("Attempt", i+1, "Error:", error);
                        if (i === 2) {
                            let errorDisplay = `อ่านไม่ได้: ${lastErrorMsg}`;
                            if (lastErrorMsg.includes("API key not valid")) {
                                errorDisplay = "API Key ไม่ถูกต้อง กดปุ่ม 🔑 มุมขวาบนเพื่อใส่ใหม่";
                                localStorage.removeItem('gemini_api_key');
                                setApiKey('');
                            } else if (lastErrorMsg.includes("Failed to fetch")) {
                                errorDisplay = "การเชื่อมต่อล้มเหลว (อาจโดน Adblocker หรือเน็ตมีปัญหา)";
                            }
                            showToast(errorDisplay, "error");
                            setIsLoading(false);
                        }
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.date || !formData.totalAfterDiscount) {
                    showToast("กรุณากรอกวันที่ และราคาที่จ่ายจริง", "error"); return;
                }

                setIsLoading(true);
                setLoadingText("กำลังตรวจสอบและบันทึกข้อมูล...");

                let payload = { ...formData, image: imageBase64, forceSave: false };

                try {
                    let response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                    let result = await response.json();

                    // ระบบดักจับการซ้ำจากฐานข้อมูล
                    if (result.status === 'duplicate') {
                        setIsLoading(false);
                        const confirmSave = window.confirm(`⚠️ ฐานข้อมูลแจ้งเตือน: ตรวจพบข้อมูลซ้ำ!\n\nคุณเคยบันทึกยอดเงิน ฿${formData.totalAfterDiscount} (ปริมาณ ${formData.volume} ลิตร) ของวันที่ ${formData.date} ไปแล้ว\n\nคุณแน่ใจหรือไม่ว่าต้องการบันทึกรายการนี้ซ้ำอีกครั้ง?`);
                        
                        if (confirmSave) {
                            setIsLoading(true);
                            setLoadingText("กำลังบังคับบันทึกข้อมูลซ้ำ...");
                            payload.forceSave = true;
                            response = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                            result = await response.json();
                        } else {
                            return; 
                        }
                    }

                    if (result.status === 'success') {
                        showToast("บันทึกข้อมูลเรียบร้อยแล้ว!");
                        
                        // อัปเดตตารางความจำในเครื่องทันที
                        const newItem = {
                            'วันที่ (Date)': formData.date,
                            'ชนิดน้ำมัน (Fuel Type)': formData.fuelType,
                            'ราคา/ลิตร (Price/L)': formData.pricePerLiter,
                            'จำนวนลิตร (Volume)': formData.volume,
                            'ราคาก่อนลด (Total Before)': formData.totalBeforeDiscount,
                            'ส่วนลด (Discount)': formData.discount,
                            'ราคาหลังลด (Total Paid)': formData.totalAfterDiscount,
                            'ลิงก์รูปภาพ (Image URL)': result.imageUrl || ''
                        };
                        setSheetData(prevData => [...prevData, newItem]);

                        setImageBase64(null);
                        setFormData({ date: '', fuelType: '', pricePerLiter: '', volume: '', totalBeforeDiscount: '', discount: '0', totalAfterDiscount: '' });
                        
                        setTimeout(() => {
                            fetchDashboardData(); 
                            setActiveTab('dashboard');
                        }, 1000);
                    } else { throw new Error(result.message); }
                    
                } catch (error) {
                    showToast("บันทึกไม่สำเร็จ: " + error.message, "error");
                } finally { 
                    setIsLoading(false); 
                }
            };

            const fetchDashboardData = async () => {
                try {
                    const urlWithTimestamp = GAS_URL + "?t=" + new Date().getTime();
                    const response = await fetch(urlWithTimestamp, { cache: "no-store" });
                    const result = await response.json();
                    if (result.status === 'success' && result.data) {
                        setSheetData(result.data);
                    }
                } catch (error) { console.error("Fetch Data Error:", error); }
            };

            useEffect(() => { fetchDashboardData(); }, []);

            const resetApiKey = () => {
                if(window.confirm("คุณต้องการลบ API Key ที่บันทึกไว้ออกจากเครื่องใช่หรือไม่?")) {
                    localStorage.removeItem('gemini_api_key');
                    setApiKey('');
                    showToast("ลบ API Key เรียบร้อยแล้ว");
                }
            };

            const renderRecordView = () => (
                <div className="animate-fade-in">
                    <div className="bg-white p-5 rounded-2xl shadow-sm mb-6">
                        <input type="file" accept="image/*" capture="environment" ref={fileInputRef} className="hidden" onChange={handleFileChange} />
                        {!imageBase64 ? (
                            <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed border-emerald-300 rounded-xl p-8 text-center cursor-pointer hover:bg-emerald-50 transition">
                                <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3">
                                    <i className="fas fa-camera text-2xl"></i>
                                </div>
                                <h3 className="text-gray-800 font-medium text-lg">ถ่ายรูปใบเสร็จ</h3>
                                <p className="text-gray-500 text-sm mt-1">AI จะช่วยดึงข้อมูลให้อัตโนมัติ</p>
                            </div>
                        ) : (
                            <div className="relative">
                                <img src={imageBase64} alt="Receipt" className="w-full h-48 object-cover rounded-xl border border-gray-200" />
                                <button onClick={() => fileInputRef.current.click()} className="absolute bottom-3 right-3 bg-white/90 backdrop-blur text-gray-800 p-2 px-4 rounded-full shadow text-sm font-medium flex items-center gap-2">
                                    <i className="fas fa-redo"></i> ถ่ายใหม่
                                </button>
                            </div>
                        )}
                    </div>

                    <form onSubmit={handleSave} className="bg-white p-5 rounded-2xl shadow-sm space-y-4 mb-24">
                        <div className="flex items-center gap-2 mb-2 border-b pb-3">
                            <i className="fas fa-file-invoice-dollar text-emerald-500"></i>
                            <h3 className="font-semibold text-gray-800">ตรวจสอบความถูกต้อง</h3>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="col-span-2">
                                <label className="block text-xs text-gray-500 mb-1">วันที่เติมน้ำมัน</label>
                                <input type="date" value={formData.date} onChange={e => handleFormChange('date', e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" required />
                            </div>
                            
                            {/* 🛠️ ช่องชนิดน้ำมันแบบ Dropdown อัจฉริยะ (Datalist) */}
                            <div className="col-span-2">
                                <label className="block text-xs text-gray-500 mb-1">ชนิดน้ำมัน (แยกตามรถ)</label>
                                <input 
                                    list="fuel-options" 
                                    value={formData.fuelType} 
                                    onChange={e => handleFormChange('fuelType', e.target.value)} 
                                    className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" 
                                    placeholder="กดเพื่อเลือก หรือพิมพ์ชื่อน้ำมันเอง" 
                                />
                                <datalist id="fuel-options">
                                    {uniqueFuels.filter(f => f !== 'All').map(fuel => (
                                        <option key={fuel} value={fuel} />
                                    ))}
                                    {/* ตัวเลือกมาตรฐานเผื่อยังไม่มีประวัติ */}
                                    <option value="แก๊สโซฮอล์ 95" />
                                    <option value="ดีเซล" />
                                </datalist>
                            </div>

                            <div>
                                <label className="block text-xs text-gray-500 mb-1">จำนวนลิตร (L)</label>
                                <input type="number" step="0.01" value={formData.volume} onChange={e => handleFormChange('volume', e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">ราคา/ลิตร (฿)</label>
                                <input type="number" step="0.01" value={formData.pricePerLiter} onChange={e => handleFormChange('pricePerLiter', e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" />
                            </div>
                            <div className="col-span-2 border-t pt-3 mt-1"></div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">ราคาก่อนลด</label>
                                <input type="number" step="0.01" value={formData.totalBeforeDiscount} onChange={e => handleFormChange('totalBeforeDiscount', e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" />
                            </div>
                            <div>
                                <label className="block text-xs text-red-500 mb-1">ส่วนลด</label>
                                <input type="number" step="0.01" value={formData.discount} onChange={e => handleFormChange('discount', e.target.value)} className="w-full p-2.5 bg-red-50 border border-red-200 text-red-600 rounded-lg focus:outline-none focus:border-red-400" />
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs font-semibold text-emerald-600 mb-1">ราคาจ่ายจริง (฿) <span className="font-normal text-gray-400 ml-1">(คำนวณอัตโนมัติ)</span></label>
                                <input type="number" step="0.01" value={formData.totalAfterDiscount} onChange={e => handleFormChange('totalAfterDiscount', e.target.value)} className="w-full p-3 bg-emerald-50 border-2 border-emerald-200 text-emerald-700 font-bold rounded-lg focus:outline-none focus:border-emerald-500 text-lg" required />
                            </div>
                        </div>
                        
                        <button type="submit" disabled={isLoading} className={`w-full text-white font-medium p-3.5 rounded-xl shadow-md transition mt-4 flex justify-center items-center gap-2 ${isLoading ? 'bg-gray-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                            <i className="fas fa-save"></i> {isLoading ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                        </button>
                    </form>
                </div>
            );

            const renderDashboardView = () => {
                const filteredData = sheetData.filter(item => {
                    const matchFuel = selectedFuel === 'All' || item['ชนิดน้ำมัน (Fuel Type)'] === selectedFuel;
                    const itemYear = String(item['วันที่ (Date)'] || '').substring(0, 4);
                    const matchYear = selectedYear === 'All' || itemYear === selectedYear;
                    return matchFuel && matchYear;
                });

                return (
                    <div className="animate-fade-in pb-24">
                        
                        {/* 🛠️ แถบควบคุม: เลือกปี และ เลือกชนิดน้ำมัน */}
                        <div className="flex justify-between items-center mb-4 border-b border-gray-200 pb-2">
                            <h2 className="text-lg font-bold text-gray-800">ภาพรวมสถิติ</h2>
                            <select 
                                value={selectedYear} 
                                onChange={e => setSelectedYear(e.target.value)}
                                className="bg-white border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block p-1.5 shadow-sm outline-none"
                            >
                                {uniqueYears.map(year => (
                                    <option key={year} value={year}>{year === 'All' ? 'ดูทุกปี' : `ปี ${year}`}</option>
                                ))}
                            </select>
                        </div>

                        {uniqueFuels.length > 1 && (
                            <div className="flex gap-2 overflow-x-auto pb-4 mb-2 scrollbar-hide">
                                {uniqueFuels.map(fuel => (
                                    <button 
                                        key={fuel} 
                                        onClick={() => setSelectedFuel(fuel)}
                                        className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium transition-colors border ${
                                            selectedFuel === fuel 
                                                ? 'bg-emerald-600 text-white border-emerald-600 shadow' 
                                                : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'
                                        }`}
                                    >
                                        {fuel === 'All' ? '🚗 รวมทุกคัน' : `⛽ ${fuel}`}
                                    </button>
                                ))}
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 p-4 rounded-2xl shadow text-white">
                                <p className="text-emerald-100 text-xs mb-1">รวมค่าใช้จ่าย</p>
                                <h3 className="text-xl font-bold">฿{dashMetrics.totalSpend.toLocaleString(undefined, {minimumFractionDigits:2})}</h3>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                <p className="text-gray-500 text-xs mb-1">รวมน้ำมันที่เติม</p>
                                <h3 className="text-xl font-bold text-gray-800">{dashMetrics.totalVolume.toFixed(2)} <span className="text-sm">ลิตร</span></h3>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                <p className="text-red-500 text-xs mb-1"><i className="fas fa-tag"></i> ประหยัดไป</p>
                                <h3 className="text-xl font-bold text-gray-800">฿{dashMetrics.totalDiscount.toLocaleString(undefined, {minimumFractionDigits:2})}</h3>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                <p className="text-blue-500 text-xs mb-1"><i className="fas fa-gas-pump"></i> เฉลี่ย/ลิตร</p>
                                <h3 className="text-xl font-bold text-gray-800">฿{dashMetrics.avgPrice.toFixed(2)}</h3>
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm mb-6"><h3 className="text-sm font-semibold text-gray-700 mb-4">ยอดใช้จ่ายรายเดือน</h3><BarChart data={filteredData} /></div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm mb-6"><h3 className="text-sm font-semibold text-gray-700 mb-4">แนวโน้มราคาน้ำมันล่าสุด</h3><LineChart data={filteredData} /></div>
                        <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                            <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                <h3 className="text-sm font-semibold text-gray-700">รายการล่าสุด</h3>
                                <button onClick={fetchDashboardData} className="text-emerald-600 text-xs hover:underline"><i className="fas fa-sync-alt mr-1"></i>รีเฟรช</button>
                            </div>
                            <div className="divide-y divide-gray-100">
                                {filteredData.slice(-5).reverse().map((item, idx) => (
                                    <div key={idx} className="p-4 flex justify-between items-center hover:bg-gray-50">
                                        <div><p className="font-medium text-gray-800 text-sm">{item['ชนิดน้ำมัน (Fuel Type)'] || 'ไม่ระบุ'}</p>
                                             <p className="text-xs text-gray-500">{item['วันที่ (Date)']} • {safeParseNum(item['จำนวนลิตร (Volume)']).toFixed(2)} ลิตร</p>
                                        </div>
                                        <div className="text-right"><p className="font-bold text-gray-800 text-sm">฿{safeParseNum(item['ราคาหลังลด (Total Paid)']).toFixed(2)}</p>
                                            {item['ลิงก์รูปภาพ (Image URL)'] && (<a href={item['ลิงก์รูปภาพ (Image URL)']} target="_blank" className="text-[10px] text-blue-500 bg-blue-50 px-2 py-1 rounded inline-block mt-1"><i className="fas fa-image"></i> ดูบิล</a>)}
                                        </div>
                                    </div>
                                ))}
                                {filteredData.length === 0 && <p className="text-center text-sm text-gray-500 p-6">ยังไม่มีข้อมูลการเติมน้ำมัน</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative pb-20 max-w-md mx-auto shadow-2xl bg-gray-50 overflow-hidden">
                    <header className="glass-effect sticky top-0 z-30 px-5 py-4 flex justify-between items-center border-b border-gray-200">
                        <div>
                            <h1 className="text-xl font-bold text-emerald-600 flex items-center gap-2"><i className="fas fa-gas-pump"></i> MyFuel</h1>
                            <p className="text-xs text-gray-500">จัดการค่าใช้จ่ายน้ำมันอัจฉริยะ</p>
                        </div>
                        <div onClick={resetApiKey} className="w-10 h-10 bg-emerald-100 rounded-full flex justify-center items-center text-emerald-600 shadow-inner cursor-pointer hover:bg-red-100 hover:text-red-500 transition" title="ลบ API Key">
                            <i className="fas fa-key"></i>
                        </div>
                    </header>

                    <main className="p-5 overflow-y-auto h-[calc(100vh-140px)]">
                        {activeTab === 'record' ? renderRecordView() : renderDashboardView()}
                    </main>

                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 flex justify-around p-3 pb-6 z-30 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setActiveTab('record')} className={`flex flex-col items-center gap-1 w-20 transition-colors ${activeTab === 'record' ? 'text-emerald-600' : 'text-gray-400'}`}>
                            <div className={`p-2 rounded-xl ${activeTab === 'record' ? 'bg-emerald-50' : ''}`}><i className="fas fa-camera text-xl"></i></div>
                            <span className="text-[10px] font-medium">สแกนบิล</span>
                        </button>
                        <button onClick={() => { setActiveTab('dashboard'); fetchDashboardData(); }} className={`flex flex-col items-center gap-1 w-20 transition-colors ${activeTab === 'dashboard' ? 'text-emerald-600' : 'text-gray-400'}`}>
                            <div className={`p-2 rounded-xl ${activeTab === 'dashboard' ? 'bg-emerald-50' : ''}`}><i className="fas fa-chart-pie text-xl"></i></div>
                            <span className="text-[10px] font-medium">สถิติ</span>
                        </button>
                    </nav>

                    {isLoading && <LoadingOverlay text={loadingText} />}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
