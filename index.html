<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel Receipt & Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // การตั้งค่าระบบ
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwzixYSqBCzEZvimWeNCjmiJEz7n8zrFD88BAAM2DYzEWRJWfAfkrgKDXw0Zt_mZ676/exec";
        const GEMINI_API_KEY = "AIzaSyAHQPJtGbTSpjI-uBvJ0b-lCM_tTmFQXn8"; // รันไทม์จะจัดเตรียมให้
        
        // ==========================================
        // UI Components
        // ==========================================
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';

            return (
                <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 w-[90%] max-w-sm">
                    <div className={`${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 animate-fade-in-down`}>
                        <i className={`fas ${icon} text-xl`}></i>
                        <span className="font-medium text-sm">{message}</span>
                    </div>
                </div>
            );
        };

        const LoadingOverlay = ({ text }) => (
            <div className="fixed inset-0 bg-black/50 z-40 flex flex-col items-center justify-center backdrop-blur-sm">
                <div className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-4">
                    <div className="spinner w-10 h-10 border-4 border-t-emerald-500"></div>
                    <p className="text-gray-700 font-medium">{text}</p>
                </div>
            </div>
        );

        // ==========================================
        // กราฟ (Chart.js Wrapper)
        // ==========================================
        const BarChart = ({ data }) => {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                if (!data || data.length === 0) return;
                
                const monthlySpend = {};
                data.forEach(item => {
                    const dateStr = item['วันที่ (Date)'];
                    if (!dateStr) return;
                    const month = dateStr.substring(0, 7); // ตัดเอาแค่ YYYY-MM
                    monthlySpend[month] = (monthlySpend[month] || 0) + Number(item['ราคาหลังลด (Total Paid)'] || 0);
                });

                const labels = Object.keys(monthlySpend).sort();
                const values = labels.map(l => monthlySpend[l]);

                const ctx = canvasRef.current.getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(l => {
                            const [y, m] = l.split('-');
                            const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
                            return `${months[parseInt(m)-1]} ${y.substring(2)}`;
                        }),
                        datasets: [{
                            label: 'ยอดจ่ายจริง (บาท)',
                            data: values,
                            backgroundColor: 'rgba(16, 185, 129, 0.8)',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
                return () => chart.destroy();
            }, [data]);

            return <div className="h-48 w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        const LineChart = ({ data }) => {
            const canvasRef = useRef(null);
            
            useEffect(() => {
                if (!data || data.length === 0) return;
                
                // เอารายการ 10 อันดับล่าสุดมาพล็อตกราฟราคาน้ำมัน
                const recentData = [...data].sort((a, b) => new Date(a['วันที่ (Date)']) - new Date(b['วันที่ (Date)'])).slice(-10);
                
                const labels = recentData.map(item => {
                    if(!item['วันที่ (Date)']) return '';
                    const d = item['วันที่ (Date)'].split('-');
                    return `${d[2]}/${d[1]}`;
                });
                const values = recentData.map(item => Number(item['ราคา/ลิตร (Price/L)'] || 0));

                const ctx = canvasRef.current.getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'ราคาต่อลิตร (บาท)',
                            data: values,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });
                return () => chart.destroy();
            }, [data]);

            return <div className="h-48 w-full"><canvas ref={canvasRef}></canvas></div>;
        };

        // ==========================================
        // Main Application
        // ==========================================
        const App = () => {
            const [activeTab, setActiveTab] = useState('record'); // 'record' | 'dashboard'
            const [toast, setToast] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");

            // State สำหรับฟอร์มบันทึก
            const [imageBase64, setImageBase64] = useState(null);
            const [formData, setFormData] = useState({
                date: '', fuelType: '', pricePerLiter: '', volume: '', 
                totalBeforeDiscount: '', discount: '0', totalAfterDiscount: ''
            });
            const fileInputRef = useRef(null);

            // State สำหรับ Dashboard
            const [sheetData, setSheetData] = useState([]);
            const [dashMetrics, setDashMetrics] = useState({ totalSpend: 0, totalVolume: 0, totalDiscount: 0, avgPrice: 0 });

            const showToast = (message, type = 'success') => setToast({ message, type });

            // ----------------------------------------
            // ฟังก์ชันย่อขนาดรูปภาพก่อนส่ง (ลดภาระเน็ตและ AI)
            // ----------------------------------------
            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1200; const MAX_HEIGHT = 1200;
                            let width = img.width; let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                            } else {
                                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                            }
                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            // ----------------------------------------
            // จัดการอัปโหลดรูป
            // ----------------------------------------
            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                try {
                    setIsLoading(true);
                    setLoadingText("กำลังประมวลผลรูปภาพ...");
                    const resizedBase64 = await resizeImage(file);
                    setImageBase64(resizedBase64);
                    
                    // เรียก AI ทันทีหลังจากโหลดรูปเสร็จ
                    await extractDataWithAI(resizedBase64);
                } catch (err) {
                    showToast("เกิดข้อผิดพลาดในการโหลดรูป", "error");
                    setIsLoading(false);
                }
            };

            // ----------------------------------------
            // เรียกใช้งาน Gemini AI (พร้อมระบบ Retry)
            // ----------------------------------------
            const extractDataWithAI = async (base64Str) => {
                setLoadingText("AI กำลังอ่านใบเสร็จ...");
                
                const prompt = `คุณคือผู้ช่วยดึงข้อมูลจากใบเสร็จค่าน้ำมันภาษาไทย (เช่น ปั๊ม PT, PTT, ฯลฯ)
กรุณาดึงข้อมูลต่อไปนี้ และตอบกลับมาเป็นรูปแบบ JSON เท่านั้น โดยไม่มีข้อความอื่นเจือปน
ตัวอย่าง JSON:
{
  "date": "YYYY-MM-DD", 
  "fuelType": "ชื่อชนิดน้ำมัน เช่น แก๊สโซฮอล์ 95, ดีเซล",
  "pricePerLiter": 31.65,
  "volume": 33.17,
  "totalBeforeDiscount": 1050.00,
  "discount": 17.00,
  "totalAfterDiscount": 1033.00
}
หมายเหตุ:
- date: แปลงเป็น ค.ศ. (YYYY-MM-DD) หากใบเสร็จเป็น พ.ศ. ให้ลบ 543
- ถ้าระบุส่วนลดไม่ได้ ให้ใส่ 0
- totalAfterDiscount คือราคาที่ต้องจ่ายสุทธิ (Total / Net)`;

                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/jpeg", data: base64Str.split(',')[1] } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                const delays = [1000, 2000, 4000, 8000];

                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) throw new Error("API Error");
                        
                        const result = await response.json();
                        
                        let text = '{}';
                        if (result.candidates && result.candidates.length > 0 && 
                            result.candidates[0].content && result.candidates[0].content.parts && 
                            result.candidates[0].content.parts.length > 0) {
                            text = result.candidates[0].content.parts[0].text;
                        }
                        
                        const extractedData = JSON.parse(text);
                        
                        setFormData({
                            date: extractedData.date || '',
                            fuelType: extractedData.fuelType || '',
                            pricePerLiter: extractedData.pricePerLiter || '',
                            volume: extractedData.volume || '',
                            totalBeforeDiscount: extractedData.totalBeforeDiscount || '',
                            discount: extractedData.discount || '0',
                            totalAfterDiscount: extractedData.totalAfterDiscount || ''
                        });
                        
                        showToast("ดึงข้อมูลสำเร็จ! กรุณาตรวจสอบความถูกต้อง");
                        setIsLoading(false);
                        return; // สำเร็จแล้วออกจาก loop
                    } catch (error) {
                        if (i === 4) {
                            showToast("AI ไม่สามารถอ่านข้อมูลได้ กรุณากรอกเอง", "error");
                            setIsLoading(false);
                        }
                        await new Promise(res => setTimeout(res, delays[i]));
                    }
                }
            };

            // ----------------------------------------
            // บันทึกข้อมูลลง Google Sheets
            // ----------------------------------------
            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.date || !formData.totalAfterDiscount) {
                    showToast("กรุณากรอกวันที่ และราคาที่จ่ายจริง", "error");
                    return;
                }

                setIsLoading(true);
                setLoadingText("กำลังบันทึกข้อมูล และอัปโหลดรูป...");

                const payload = {
                    ...formData,
                    image: imageBase64 // ส่งรูปไปด้วย
                };

                try {
                    // ใช้ text/plain เพื่อหลีกเลี่ยง CORS Preflight issue ใน Apps Script
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        showToast("บันทึกข้อมูลเรียบร้อยแล้ว!");
                        // รีเซ็ตฟอร์ม
                        setImageBase64(null);
                        setFormData({ date: '', fuelType: '', pricePerLiter: '', volume: '', totalBeforeDiscount: '', discount: '0', totalAfterDiscount: '' });
                        // ดึงข้อมูลใหม่เพื่ออัปเดต Dashboard
                        fetchDashboardData(); 
                        setTimeout(() => setActiveTab('dashboard'), 1000); // ย้ายไปหน้าแดชบอร์ด
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    showToast("บันทึกไม่สำเร็จ: " + error.message, "error");
                } finally {
                    setIsLoading(false);
                }
            };

            // ----------------------------------------
            // ดึงข้อมูล Dashboard จาก Google Sheets
            // ----------------------------------------
            const fetchDashboardData = async () => {
                try {
                    const response = await fetch(GAS_URL);
                    const result = await response.json();
                    if (result.status === 'success' && result.data) {
                        setSheetData(result.data);
                        calculateMetrics(result.data);
                    }
                } catch (error) {
                    console.error("Fetch Data Error:", error);
                }
            };

            const calculateMetrics = (data) => {
                if(!data || data.length === 0) return;
                
                // กรองข้อมูลเฉพาะเดือนปัจจุบัน (ตัวอย่าง)
                const currentMonth = new Date().toISOString().substring(0, 7); // YYYY-MM
                
                let tSpend = 0, tVol = 0, tDisc = 0;
                
                data.forEach(item => {
                    tSpend += Number(item['ราคาหลังลด (Total Paid)'] || 0);
                    tVol += Number(item['จำนวนลิตร (Volume)'] || 0);
                    tDisc += Number(item['ส่วนลด (Discount)'] || 0);
                });

                setDashMetrics({
                    totalSpend: tSpend,
                    totalVolume: tVol,
                    totalDiscount: tDisc,
                    avgPrice: tVol > 0 ? (tSpend / tVol) : 0
                });
            };

            // ดึงข้อมูลเมื่อโหลดแอปครั้งแรก
            useEffect(() => {
                fetchDashboardData();
            }, []);


            // ----------------------------------------
            // Render View: หน้าบันทึก (Record)
            // ----------------------------------------
            const renderRecordView = () => (
                <div className="animate-fade-in">
                    {/* กล่องอัปโหลด/ถ่ายรูป */}
                    <div className="bg-white p-5 rounded-2xl shadow-sm mb-6">
                        <input type="file" accept="image/*" capture="environment" ref={fileInputRef} className="hidden" onChange={handleFileChange} />
                        
                        {!imageBase64 ? (
                            <div 
                                onClick={() => fileInputRef.current.click()}
                                className="border-2 border-dashed border-emerald-300 rounded-xl p-8 text-center cursor-pointer hover:bg-emerald-50 transition"
                            >
                                <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3">
                                    <i className="fas fa-camera text-2xl"></i>
                                </div>
                                <h3 className="text-gray-800 font-medium text-lg">ถ่ายรูปใบเสร็จ</h3>
                                <p className="text-gray-500 text-sm mt-1">AI จะช่วยดึงข้อมูลให้อัตโนมัติ</p>
                            </div>
                        ) : (
                            <div className="relative">
                                <img src={imageBase64} alt="Receipt" className="w-full h-48 object-cover rounded-xl border border-gray-200" />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="absolute bottom-3 right-3 bg-white/90 backdrop-blur text-gray-800 p-2 px-4 rounded-full shadow text-sm font-medium flex items-center gap-2"
                                >
                                    <i className="fas fa-redo"></i> ถ่ายใหม่
                                </button>
                            </div>
                        )}
                    </div>

                    {/* ฟอร์มแก้ไขข้อมูล */}
                    <form onSubmit={handleSave} className="bg-white p-5 rounded-2xl shadow-sm space-y-4 mb-24">
                        <div className="flex items-center gap-2 mb-2 border-b pb-3">
                            <i className="fas fa-file-invoice-dollar text-emerald-500"></i>
                            <h3 className="font-semibold text-gray-800">ตรวจสอบความถูกต้อง</h3>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="col-span-2">
                                <label className="block text-xs text-gray-500 mb-1">วันที่เติมน้ำมัน</label>
                                <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" required />
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs text-gray-500 mb-1">ชนิดน้ำมัน</label>
                                <input type="text" value={formData.fuelType} onChange={e => setFormData({...formData, fuelType: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" placeholder="เช่น แก๊สโซฮอล์ 95" />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">จำนวนลิตร (L)</label>
                                <input type="number" step="0.01" value={formData.volume} onChange={e => setFormData({...formData, volume: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" />
                            </div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">ราคา/ลิตร (฿)</label>
                                <input type="number" step="0.01" value={formData.pricePerLiter} onChange={e => setFormData({...formData, pricePerLiter: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" />
                            </div>
                            <div className="col-span-2 border-t pt-3 mt-1"></div>
                            <div>
                                <label className="block text-xs text-gray-500 mb-1">ราคาก่อนลด</label>
                                <input type="number" step="0.01" value={formData.totalBeforeDiscount} onChange={e => setFormData({...formData, totalBeforeDiscount: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-emerald-500" />
                            </div>
                            <div>
                                <label className="block text-xs text-red-500 mb-1">ส่วนลด</label>
                                <input type="number" step="0.01" value={formData.discount} onChange={e => setFormData({...formData, discount: e.target.value})} className="w-full p-2.5 bg-red-50 border border-red-200 text-red-600 rounded-lg focus:outline-none focus:border-red-400" />
                            </div>
                            <div className="col-span-2">
                                <label className="block text-xs font-semibold text-emerald-600 mb-1">ราคาจ่ายจริง (฿)</label>
                                <input type="number" step="0.01" value={formData.totalAfterDiscount} onChange={e => setFormData({...formData, totalAfterDiscount: e.target.value})} className="w-full p-3 bg-emerald-50 border-2 border-emerald-200 text-emerald-700 font-bold rounded-lg focus:outline-none focus:border-emerald-500 text-lg" required />
                            </div>
                        </div>

                        <button type="submit" className="w-full bg-emerald-600 text-white font-medium p-3.5 rounded-xl shadow-md hover:bg-emerald-700 transition mt-4 flex justify-center items-center gap-2">
                            <i className="fas fa-save"></i> บันทึกข้อมูล
                        </button>
                    </form>
                </div>
            );

            // ----------------------------------------
            // Render View: หน้า Dashboard
            // ----------------------------------------
            const renderDashboardView = () => (
                <div className="animate-fade-in pb-24">
                    {/* Key Metrics */}
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 p-4 rounded-2xl shadow text-white">
                            <p className="text-emerald-100 text-xs mb-1">รวมค่าใช้จ่าย</p>
                            <h3 className="text-xl font-bold">฿{dashMetrics.totalSpend.toLocaleString(undefined, {minimumFractionDigits:2})}</h3>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                            <p className="text-gray-500 text-xs mb-1">รวมน้ำมันที่เติม</p>
                            <h3 className="text-xl font-bold text-gray-800">{dashMetrics.totalVolume.toFixed(2)} <span className="text-sm">ลิตร</span></h3>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                            <p className="text-red-500 text-xs mb-1"><i className="fas fa-tag"></i> ประหยัดไป</p>
                            <h3 className="text-xl font-bold text-gray-800">฿{dashMetrics.totalDiscount.toLocaleString(undefined, {minimumFractionDigits:2})}</h3>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                            <p className="text-blue-500 text-xs mb-1"><i className="fas fa-gas-pump"></i> เฉลี่ย/ลิตร</p>
                            <h3 className="text-xl font-bold text-gray-800">฿{dashMetrics.avgPrice.toFixed(2)}</h3>
                        </div>
                    </div>

                    {/* Charts */}
                    <div className="bg-white p-4 rounded-2xl shadow-sm mb-6">
                        <h3 className="text-sm font-semibold text-gray-700 mb-4">ยอดใช้จ่ายรายเดือน</h3>
                        <BarChart data={sheetData} />
                    </div>

                    <div className="bg-white p-4 rounded-2xl shadow-sm mb-6">
                        <h3 className="text-sm font-semibold text-gray-700 mb-4">แนวโน้มราคาน้ำมันล่าสุด</h3>
                        <LineChart data={sheetData} />
                    </div>

                    {/* Recent Transactions */}
                    <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
                        <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                            <h3 className="text-sm font-semibold text-gray-700">รายการล่าสุด</h3>
                            <button onClick={fetchDashboardData} className="text-emerald-600 text-xs hover:underline"><i className="fas fa-sync-alt mr-1"></i>รีเฟรช</button>
                        </div>
                        <div className="divide-y divide-gray-100">
                            {sheetData.slice(-5).reverse().map((item, idx) => (
                                <div key={idx} className="p-4 flex justify-between items-center hover:bg-gray-50">
                                    <div>
                                        <p className="font-medium text-gray-800 text-sm">{item['ชนิดน้ำมัน (Fuel Type)'] || 'ไม่ระบุ'}</p>
                                        <p className="text-xs text-gray-500">{item['วันที่ (Date)']} • {Number(item['จำนวนลิตร (Volume)']||0).toFixed(2)} ลิตร</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="font-bold text-gray-800 text-sm">฿{Number(item['ราคาหลังลด (Total Paid)']||0).toFixed(2)}</p>
                                        {item['ลิงก์รูปภาพ (Image URL)'] && (
                                            <a href={item['ลิงก์รูปภาพ (Image URL)']} target="_blank" className="text-[10px] text-blue-500 bg-blue-50 px-2 py-1 rounded inline-block mt-1">
                                                <i className="fas fa-image"></i> ดูบิล
                                            </a>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {sheetData.length === 0 && <p className="text-center text-sm text-gray-500 p-6">ยังไม่มีข้อมูลการเติมน้ำมัน</p>}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen relative pb-20 max-w-md mx-auto shadow-2xl bg-gray-50 overflow-hidden">
                    {/* Header */}
                    <header className="glass-effect sticky top-0 z-30 px-5 py-4 flex justify-between items-center border-b border-gray-200">
                        <div>
                            <h1 className="text-xl font-bold text-emerald-600 flex items-center gap-2">
                                <i className="fas fa-gas-pump"></i> MyFuel
                            </h1>
                            <p className="text-xs text-gray-500">จัดการค่าใช้จ่ายน้ำมันอัจฉริยะ</p>
                        </div>
                        <div className="w-10 h-10 bg-emerald-100 rounded-full flex justify-center items-center text-emerald-600 shadow-inner">
                            <i className="fas fa-user"></i>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="p-5 overflow-y-auto h-[calc(100vh-140px)]">
                        {activeTab === 'record' ? renderRecordView() : renderDashboardView()}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 flex justify-around p-3 pb-6 z-30 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button 
                            onClick={() => setActiveTab('record')}
                            className={`flex flex-col items-center gap-1 w-20 transition-colors ${activeTab === 'record' ? 'text-emerald-600' : 'text-gray-400'}`}
                        >
                            <div className={`p-2 rounded-xl ${activeTab === 'record' ? 'bg-emerald-50' : ''}`}>
                                <i className="fas fa-camera text-xl"></i>
                            </div>
                            <span className="text-[10px] font-medium">สแกนบิล</span>
                        </button>
                        <button 
                            onClick={() => { setActiveTab('dashboard'); fetchDashboardData(); }}
                            className={`flex flex-col items-center gap-1 w-20 transition-colors ${activeTab === 'dashboard' ? 'text-emerald-600' : 'text-gray-400'}`}
                        >
                            <div className={`p-2 rounded-xl ${activeTab === 'dashboard' ? 'bg-emerald-50' : ''}`}>
                                <i className="fas fa-chart-pie text-xl"></i>
                            </div>
                            <span className="text-[10px] font-medium">สถิติ</span>
                        </button>
                    </nav>

                    {/* Overlays */}
                    {isLoading && <LoadingOverlay text={loadingText} />}
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
